    <style>
        .icono-carrito {
    width: 35px;          /* Tamaño del logo */
    height: 35px;
    fill: none;           /* Sin fondo negro o gris */
    stroke: #290b5e;      /* Tu color morado principal */
    stroke-width: 2;      /* Grosor de la línea */
    stroke-linecap: round;
    stroke-linejoin: round;
    cursor: pointer;
    transition: transform 0.3s ease, stroke 0.3s ease;
}

/* Efecto divertido cuando el usuario pasa el mouse para ir a pagar */
.icono-carrito:hover {
    stroke: #7B2CBF;      /* Cambia al morado más claro/encendido */
    transform: scale(1.1) rotate(-5deg); /* Se hace un poquito más grande y se inclina */
}
